<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; }

  /* ── HOME ── */
  #home-page { padding: 24px; }
  .home-header { text-align: center; padding: 32px 0 24px; }
  .home-header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  .home-header p { color: #666; margin-top: 6px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; max-width: 1200px; margin: 0 auto; }
  .topic-card {
    background: #fff; border-radius: 12px; padding: 20px 14px; text-align: center;
    cursor: pointer; border: 1.5px solid #e0e4ef; transition: all 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .topic-card:hover { border-color: #4f6ef7; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(79,110,247,0.15); }
  .topic-card .icon { font-size: 26px; margin-bottom: 8px; }
  .topic-card h3 { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; line-height: 1.3; }
  .topic-card .meta { font-size: 11px; color: #888; }
  .topic-card .sets-badge { display: inline-block; margin-top: 8px; background: #eef1ff; color: #4f6ef7; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }

  /* ── SETS PAGE ── */
  #sets-page { padding: 24px; display: none; }
  .back-btn { background: none; border: 1.5px solid #ccc; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #444; margin-bottom: 20px; }
  .back-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
  .sets-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #1a1a2e; }
  .sets-sub { color: #777; font-size: 14px; margin-bottom: 20px; }
  .sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; max-width: 900px; }
  .set-card {
    background: #fff; border: 1.5px solid #e0e4ef; border-radius: 12px; padding: 20px;
    cursor: pointer; transition: all 0.18s; text-align: center;
  }
  .set-card:hover { border-color: #4f6ef7; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(79,110,247,0.15); }
  .set-card h4 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .set-card p { font-size: 12px; color: #888; margin-top: 4px; }
  .set-card .timer-info { margin-top: 10px; font-size: 12px; color: #4f6ef7; font-weight: 600; }

  /* ── MOCK PAGE ── */
  #mock-page { display: none; min-height: 100vh; flex-direction: column; }
  .mock-header {
    background: #1a1a2e; color: #fff; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .mock-header .mock-title { font-size: 15px; font-weight: 600; }
  .mock-header .stats { display: flex; gap: 16px; align-items: center; font-size: 13px; }
  .stat-pill { background: rgba(255,255,255,0.12); padding: 4px 12px; border-radius: 20px; }
  .stat-pill span { font-weight: 700; }
  .timer-pill { background: #e74c3c; padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
  .timer-pill.warn { background: #e67e22; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .mock-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }

  /* Nav panel */
  .nav-panel { width: 200px; background: #fff; border-right: 1px solid #e0e4ef; overflow-y: auto; padding: 12px; flex-shrink: 0; }
  .nav-panel h4 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .nav-btn {
    aspect-ratio: 1; border-radius: 6px; border: 1.5px solid #e0e4ef;
    background: #fff; font-size: 11px; font-weight: 600; cursor: pointer; color: #444;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .nav-btn.current { border-color: #4f6ef7; background: #eef1ff; color: #4f6ef7; }
  .nav-btn.answered { background: #27ae60; border-color: #27ae60; color: #fff; }
  .nav-btn.skipped { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .nav-legend { margin-top: 12px; font-size: 11px; color: #888; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* Question area */
  .question-area { flex: 1; overflow-y: auto; padding: 24px; }
  .q-number { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 8px; }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.6; color: #1a1a2e; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    border: 1.5px solid #e0e4ef; border-radius: 10px; background: #fff;
    cursor: pointer; text-align: left; transition: all 0.15s; font-size: 15px;
  }
  .option-btn:hover { border-color: #4f6ef7; background: #f7f9ff; }
  .option-btn.selected { border-color: #4f6ef7; background: #eef1ff; }
  .option-label { font-weight: 700; color: #4f6ef7; min-width: 20px; font-size: 14px; }
  .option-text { color: #333; line-height: 1.5; }

  /* Action bar */
  .action-bar { background: #fff; border-top: 1px solid #e0e4ef; padding: 12px 20px; display: flex; gap: 10px; justify-content: space-between; }
  .action-bar .left-btns, .action-bar .right-btns { display: flex; gap: 10px; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; }
  .btn-outline { background: #fff; border-color: #ccc; color: #444; }
  .btn-outline:hover { border-color: #4f6ef7; color: #4f6ef7; }
  .btn-primary { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }
  .btn-primary:hover { background: #3a58e0; }
  .btn-success { background: #27ae60; color: #fff; border-color: #27ae60; }
  .btn-success:hover { background: #219a54; }
  .btn-danger { background: #e74c3c; color: #fff; border-color: #e74c3c; }
  .btn-danger:hover { background: #c0392b; }

  /* ── REVIEW PAGE ── */
  #review-page { display: none; padding: 24px; max-width: 860px; margin: 0 auto; }
  .review-header { text-align: center; padding: 20px 0 10px; }
  .review-header h2 { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  .score-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 20px 0; }
  .score-box { background: #fff; border-radius: 12px; padding: 18px; text-align: center; border: 1.5px solid #e0e4ef; }
  .score-box .count { font-size: 32px; font-weight: 700; }
  .score-box .label { font-size: 13px; color: #888; margin-top: 4px; }
  .score-box.correct .count { color: #27ae60; }
  .score-box.wrong .count { color: #e74c3c; }
  .score-box.skipped .count { color: #f39c12; }
  .review-actions { display: flex; gap: 12px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
  .review-section-title { font-size: 16px; font-weight: 700; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid; }
  .review-section-title.wrong { color: #e74c3c; border-color: #e74c3c; }
  .review-section-title.skipped { color: #f39c12; border-color: #f39c12; }
  .review-section-title.correct { color: #27ae60; border-color: #27ae60; }
  .review-card { background: #fff; border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; border: 1.5px solid #e0e4ef; }
  .review-card .rq-num { font-size: 12px; font-weight: 700; color: #888; margin-bottom: 6px; }
  .review-card .rq-text { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: #1a1a2e; line-height: 1.5; }
  .review-option { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 14px; display: flex; align-items: flex-start; gap: 10px; }
  .review-option.correct-ans { background: #eafaf1; border: 1px solid #27ae60; }
  .review-option.user-wrong { background: #fdecea; border: 1px solid #e74c3c; }
  .review-option.normal { background: #f8f9fa; border: 1px solid #e0e4ef; }
  .ans-tag { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
  .ans-tag.c { background: #d5f5e3; color: #1e8449; }
  .ans-tag.w { background: #fde8e7; color: #c0392b; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 28px; max-width: 400px; width: 90%; text-align: center; }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #1a1a2e; }
  .modal p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  @media (max-width: 600px) {
    .nav-panel { width: 130px; }
    .nav-grid { grid-template-columns: repeat(4, 1fr); }
    .mock-header .stats { gap: 8px; }
    .score-summary { grid-template-columns: repeat(3, 1fr); }
  }
</style>

// ════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════
const QUESTIONS_PER_SET = 50;
const TIMER_SECONDS = 20 * 60; // 20 minutes
const LABELS = ['A','B','C','D'];

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let currentTopicIndex = -1;
let currentSetIndex = -1;
let currentSetQuestions = [];
let currentQuestion = 0;
let userAnswers = [];        // null = unanswered, -1 = skipped, 0-3 = selected
let timerInterval = null;
let secondsLeft = TIMER_SECONDS;

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
function getSets(topic) {
  const q = topic.questions;
  const sets = [];
  for (let i = 0; i < q.length; i += QUESTIONS_PER_SET)
    sets.push(q.slice(i, i + QUESTIONS_PER_SET));
  return sets;
}

function fmtTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function show(id) {
  ['home-page','sets-page','mock-page','review-page'].forEach(p => {
    const el = document.getElementById(p);
    if (el) el.style.display = p === id ? (p === 'mock-page' ? 'flex' : 'block') : 'none';
  });
}

// ════════════════════════════════════════════════════
//  HOME PAGE
// ════════════════════════════════════════════════════
function renderHome() {
  show('home-page');
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  TOPICS.forEach((t, i) => {
    const sets = getSets(t);
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.innerHTML = `
      <div class="icon">${t.icon}</div>
      <h3>${t.name}</h3>
      <div class="meta">${t.questions.length} Questions</div>
      <div class="sets-badge">${sets.length} Set${sets.length !== 1 ? 's' : ''}</div>
    `;
    div.onclick = () => renderSets(i);
    grid.appendChild(div);
  });
}

// ════════════════════════════════════════════════════
//  SETS PAGE
// ════════════════════════════════════════════════════
function renderSets(topicIdx) {
  currentTopicIndex = topicIdx;
  const topic = TOPICS[topicIdx];
  const sets = getSets(topic);
  show('sets-page');
  document.getElementById('sets-title').textContent = topic.name;
  document.getElementById('sets-sub').textContent = `${topic.questions.length} questions · ${sets.length} mock set${sets.length !== 1 ? 's' : ''} of ${QUESTIONS_PER_SET} each`;
  const grid = document.getElementById('sets-grid');
  grid.innerHTML = '';
  sets.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'set-card';
    div.innerHTML = `
      <h4>Mock Set ${i + 1}</h4>
      <p>${s.length} Questions</p>
      <div class="timer-info">⏱ 20 Minutes</div>
    `;
    div.onclick = () => startMock(topicIdx, i);
    grid.appendChild(div);
  });
}

// ════════════════════════════════════════════════════
//  MOCK PAGE
// ════════════════════════════════════════════════════
function startMock(topicIdx, setIdx) {
  currentTopicIndex = topicIdx;
  currentSetIndex = setIdx;
  const sets = getSets(TOPICS[topicIdx]);
  currentSetQuestions = sets[setIdx];
  userAnswers = new Array(currentSetQuestions.length).fill(null);
  currentQuestion = 0;
  secondsLeft = TIMER_SECONDS;
  show('mock-page');
  renderMockHeader();
  renderNavPanel();
  renderQuestion();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      autoSubmit();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  el.textContent = fmtTime(secondsLeft);
  el.className = 'timer-pill' + (secondsLeft <= 120 ? ' warn' : '');
}

function renderMockHeader() {
  const t = TOPICS[currentTopicIndex];
  document.getElementById('mock-title').textContent = `${t.name} — Set ${currentSetIndex + 1}`;
  updateStats();
}

function updateStats() {
  const answered = userAnswers.filter(a => a !== null && a !== -1).length;
  const left = userAnswers.filter(a => a === null).length;
  document.getElementById('stat-attempted').textContent = answered;
  document.getElementById('stat-left').textContent = left;
}

function renderNavPanel() {
  const container = document.getElementById('nav-grid');
  container.innerHTML = '';
  currentSetQuestions.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === currentQuestion ? ' current' : '');
    if (userAnswers[i] !== null && userAnswers[i] !== -1) btn.classList.add('answered');
    else if (userAnswers[i] === -1) btn.classList.add('skipped');
    btn.textContent = i + 1;
    btn.onclick = () => { currentQuestion = i; renderQuestion(); renderNavPanel(); };
    container.appendChild(btn);
  });
}

function renderQuestion() {
  const q = currentSetQuestions[currentQuestion];
  document.getElementById('q-number').textContent = `Question ${currentQuestion + 1} of ${currentSetQuestions.length}`;
  document.getElementById('q-text').textContent = q.q;
  const optContainer = document.getElementById('options-container');
  optContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (userAnswers[currentQuestion] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span><span class="option-text">${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optContainer.appendChild(btn);
  });
  // update prev/next buttons
  document.getElementById('btn-prev').disabled = currentQuestion === 0;
}

function selectAnswer(idx) {
  userAnswers[currentQuestion] = idx;
  renderQuestion();
  renderNavPanel();
  updateStats();
}

function goNext() {
  if (currentQuestion < currentSetQuestions.length - 1) {
    currentQuestion++;
    renderQuestion();
    renderNavPanel();
  }
}

function goPrev() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
    renderNavPanel();
  }
}

function saveAnswer() {
  // Answer is already saved on click; just show brief feedback
  const btn = document.getElementById('btn-save');
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Save', 1000);
}

function confirmSubmit() {
  const unanswered = userAnswers.filter(a => a === null).length;
  document.getElementById('submit-modal-body').textContent =
    unanswered > 0
      ? `You have ${unanswered} unanswered question(s). Unanswered questions will be marked as skipped. Are you sure you want to submit?`
      : `All questions answered. Are you sure you want to submit?`;
  document.getElementById('submit-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('submit-modal').classList.remove('show');
}

function autoSubmit() {
  userAnswers = userAnswers.map(a => a === null ? -1 : a);
  submitMock();
}

function submitMock() {
  clearInterval(timerInterval);
  closeModal();
  // Mark all null as skipped
  userAnswers = userAnswers.map(a => a === null ? -1 : a);
  renderReview();
}

// ════════════════════════════════════════════════════
//  REVIEW PAGE
// ════════════════════════════════════════════════════
function renderReview() {
  show('review-page');
  const q = currentSetQuestions;
  const correct = [], wrong = [], skipped = [];
  q.forEach((question, i) => {
    const ua = userAnswers[i];
    if (ua === -1) skipped.push(i);
    else if (ua === question.answer) correct.push(i);
    else wrong.push(i);
  });

  document.getElementById('score-correct').textContent = correct.length;
  document.getElementById('score-wrong').textContent = wrong.length;
  document.getElementById('score-skipped').textContent = skipped.length;

  const t = TOPICS[currentTopicIndex];
  document.getElementById('review-title').textContent = `${t.name} — Set ${currentSetIndex + 1} Results`;

  const body = document.getElementById('review-body');
  body.innerHTML = '';

  function renderSection(title, cls, indices) {
    if (!indices.length) return;
    const h = document.createElement('div');
    h.className = `review-section-title ${cls}`;
    h.textContent = `${title} (${indices.length})`;
    body.appendChild(h);
    indices.forEach(i => {
      const card = document.createElement('div');
      card.className = 'review-card';
      const ua = userAnswers[i];
      const correctIdx = q[i].answer;
      let optionsHtml = '';
      q[i].options.forEach((opt, oi) => {
        let cls2 = 'normal';
        let tag = '';
        if (oi === correctIdx) { cls2 = 'correct-ans'; tag = '<span class="ans-tag c">Correct</span>'; }
        else if (oi === ua && ua !== correctIdx) { cls2 = 'user-wrong'; tag = '<span class="ans-tag w">Your answer</span>'; }
        optionsHtml += `<div class="review-option ${cls2}"><span class="option-label">${LABELS[oi]}</span><span style="flex:1">${opt}</span>${tag}</div>`;
      });
      card.innerHTML = `
        <div class="rq-num">Q${i + 1}</div>
        <div class="rq-text">${q[i].q}</div>
        ${optionsHtml}
      `;
      body.appendChild(card);
    });
  }

  renderSection('Wrong Answers', 'wrong', wrong);
  renderSection('Skipped Questions', 'skipped', skipped);
  renderSection('Correct Answers', 'correct', correct);
}

function downloadAnswerKey() {
  const t = TOPICS[currentTopicIndex];
  const q = currentSetQuestions;
  let txt = `ANSWER KEY — ${t.name} | Set ${currentSetIndex + 1}\n`;
  txt += `Generated: ${new Date().toLocaleString()}\n`;
  txt += '='.repeat(60) + '\n\n';
  q.forEach((question, i) => {
    const ua = userAnswers[i];
    const correct = question.answer;
    const status = ua === -1 ? 'SKIPPED' : ua === correct ? 'CORRECT' : 'WRONG';
    txt += `Q${i + 1}. ${question.q}\n`;
    question.options.forEach((opt, oi) => {
      const mark = oi === correct ? '✓ ' : oi === ua && ua !== correct ? '✗ ' : '  ';
      txt += `   ${mark}${LABELS[oi]}. ${opt}\n`;
    });
    txt += `   Correct Answer: ${LABELS[correct]}\n`;
    txt += `   Your Answer: ${ua === -1 ? 'Not attempted' : LABELS[ua]}\n`;
    txt += `   Result: ${status}\n\n`;
  });

  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AnswerKey_${t.name.replace(/\s+/g,'_')}_Set${currentSetIndex + 1}.txt`;
  a.click();
}

function goHome() {
  clearInterval(timerInterval);
  renderHome();
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => renderHome());
</script>
